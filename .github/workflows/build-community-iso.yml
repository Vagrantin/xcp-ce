name: Build XCP-ng Community ISO

on:
  push:
    branches:
      - buildiso
  workflow_dispatch:
    inputs:
      xcpng_major_version:
        description: 'XCP-ng Community ISO'
        required: true
        default: '8.3'
      xcpng_minor_version:
        default: '8.3.0-20250606.2'
      release_tag:
        description: 'Release tag (e.g. 8.3.0-community-20260331)'
        required: true

jobs:
  # ── Job 1: Build the ISO ────────────────────────────────────────────────────
  build-iso:
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - uses: actions/checkout@v4

      - name: Install tools
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y xorriso genisoimage isomd5sum \
                                  rpm2cpio cpio rpm

      - name: Download official XCP-ng ISO
        run: |
          ISO_URL="https://mirrors.xcp-ng.org/isos/8.3/xcp-ng-8.3.0-20250606.2.iso"
          echo "Downloading: ${ISO_URL}"
          wget -q --show-progress -O xcpng-official.iso "${ISO_URL}"

      - name: Extract ISO
        run: |
          mkdir -p iso-work
          xorriso -osirrox on -indev xcpng-official.iso -extract / iso-work/ 2>/dev/null || true
          chmod -R u+w iso-work/

      - name: Find XO Lite RPM name
        id: find-rpm
        run: |
          RPM=$(find iso-work/Packages/ -name "xo-lite*.rpm" 2>/dev/null | head -1)
          echo "rpm_path=${RPM}" >> $GITHUB_OUTPUT
          echo "Found: ${RPM}"

      - name: Unpack XO Lite RPM
        run: |
          RPM="${{ steps.find-rpm.outputs.rpm_path }}"
          mkdir -p rpm-extract
          cd rpm-extract
          rpm2cpio "../${RPM}" | cpio -idmv 2>/dev/null
          echo "RPM contents:"
          find . -name "*.js" -o -name "*.html" -o -name "index.html" | head -30

      - name: Patch xoa-deploy.js
        run: |
          FILE=$(grep -rl "xo-image" . | head -n 1)
          pwd
          
          # Verify we can find the URL line before patching
          echo "=== Current URL line ==="
          grep -q "xoa\.io" "$FILE" && echo "Official URL found" || echo "Official URL not found"
          
          echo "=== Applying patch ==="
          # The patch script is embedded — see xoa-deploy.patch in this repo
          sed -i 's|http://xoa.io/xva|https://xo-image.yawn.fi/downloads/image.xva.gz|g' "$FILE"
          
          echo "=== Patched result ==="
          grep -q "yawn" "$FILE" && echo "Community edition URL found" || echo "Community edition URL not found"

      - name: Repack RPM
        run: |
          RPM="${{ steps.find-rpm.outputs.rpm_path }}"
          RPM_NAME=$(basename "${RPM}" .rpm)
          
          mkdir -p rpmbuild/{BUILD,RPMS/noarch,SPECS,SRPMS}
          
          cat > rpmbuild/SPECS/xo-lite.spec << SPEC
          Name:     xo-lite-community
          Version:  1.0
          Release:  1
          Summary:  XO Lite (community edition patch)
          License:  AGPLv3
          BuildArch: noarch
          Obsoletes: xcp-ng-xo-lite
          Provides:  xcp-ng-xo-lite
          
          %description
          XO Lite patched to fetch the community XOA image at runtime.
          
          %install
          install -d -m 755 %{buildroot}/opt/xensource/www
          cp -a * %{buildroot}/opt/xensource/www
          rm %{buildroot}/opt/xensource/www/LICENSE %{buildroot}/opt/xensource/www/CHANGELOG.md
          
          %files
          /opt/xensource/www/assets
          /opt/xensource/www/index.html
          /opt/xensource/www/favicon.svg
          /opt/xensource/www/manifest.webmanifest
          /opt/xensource/www/xolite.html
          SPEC
          
          rpmbuild --define "_topdir $(pwd)/rpmbuild" \
                   --define "_builddir $(pwd)/rpm-extract" \
                   -bb rpmbuild/SPECS/xo-lite.spec 2>&1
          
          NEW_RPM=$(find rpmbuild/RPMS -name "*.rpm" | head -1)
          echo "Built RPM: ${NEW_RPM}"
          
          # Replace old RPM in ISO
          rm -f "${RPM}"
          cp "${NEW_RPM}" "$(dirname ${RPM})/"

      - name: Update ISO package index
        run: |
          # Regenerate the repodata so the installer finds the new RPM
          if command -v createrepo_c &>/dev/null; then
            createrepo_c --update iso-work/
          elif command -v createrepo &>/dev/null; then
            createrepo --update iso-work/
          else
            sudo apt-get install -y createrepo-c
            createrepo_c --update iso-work/
          fi

      - name: Repack ISO
        run: |
          TAG="${{ github.event.inputs.release_tag }}"
          OUTPUT="xcp-ng-${TAG}.iso"
          
          # Capture original boot catalog and efi parameters from the source ISO
          xorriso -indev xcpng-official.iso -report_system_area cmd 2>/dev/null > boot-params.txt || true
          
          genisoimage \
            -o "${OUTPUT}" \
            -r -J -joliet-long \
            -V "XCP-ng ${TAG}" \
            -c boot/isolinux/boot.cat \
            -b boot/isolinux/isolinux.bin \
            -no-emul-boot \
            -boot-load-size 4 \
            -boot-info-table \
            -eltorito-alt-boot \
            -e boot/efiboot.img \
            -no-emul-boot \
            iso-work/ 2>&1
          
          implantisomd5 "${OUTPUT}" || true
          
          echo "OUTPUT=${OUTPUT}" >> $GITHUB_ENV
          ls -lh "${OUTPUT}"

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.release_tag }}
          name: "XCP-ng Community Edition ${{ github.event.inputs.release_tag }}"
          body: |
            ## XCP-ng Community ISO — Community Edition
            
            This is an unofficial community build of XCP-ng with XO Lite patched
            to deploy the [community XOA image](https://xo-image.yawn.fi/) instead
            of the official Vates appliance.
            
            ### What's different
            - XO Lite's "Deploy XOA" button fetches the latest community image URL
              at runtime from `https://xo-image.yawn.fi/downloads/image.txt`
            - Everything else is identical to the official XCP-ng 8.3 ISO
            
            ### Base ISO
            Official XCP-ng 8.3
            
            > **Note:** This is a community build, not supported by Vates.
          files: ${{ env.OUTPUT }}
          draft: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
